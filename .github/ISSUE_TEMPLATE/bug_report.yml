name: Bug report
description: Report something broken in OpenConvo
title: "[Bug]: "
labels: ["bug"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for reporting a bug. Please remove secrets, API keys, and private chat content before submitting.
  - type: textarea
    id: summary
    attributes:
      label: What happened?
      description: Describe the bug clearly.
      placeholder: The app did X, but I expected Y.
    validations:
      required: true
  - type: textarea
    id: steps
    attributes:
      label: Steps to reproduce
      description: Give the shortest path that triggers the issue.
      placeholder: |
        1. Go to /app
        2. Select model ...
        3. Send ...
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: Expected behavior
    validations:
      required: true
  - type: dropdown
    id: mode
    attributes:
      label: Usage mode
      options:
        - Hosted free mode
        - Bring your own OpenRouter key
        - Local/self-hosted
        - Not sure
    validations:
      required: true
  - type: input
    id: browser
    attributes:
      label: Browser and OS
      placeholder: Chrome on Windows 11
  - type: textarea
    id: logs
    attributes:
      label: Relevant logs or screenshots
      description: Paste only non-sensitive logs. Do not include API keys or private prompts.
